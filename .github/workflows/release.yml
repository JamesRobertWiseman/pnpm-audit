name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (vX.X.X format)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: ${{ github.event.inputs.version }} (must be vX.X.X)"
            exit 1
          fi

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Commit built dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/index.js
          git diff --cached --quiet || git commit -m "chore: rebuild dist for ${{ github.event.inputs.version }}"
          git push origin main

      - name: Tag release
        run: |
          git tag -a "${{ github.event.inputs.version }}" -m "${{ github.event.inputs.version }} Release"
          git push origin "${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --title "${{ github.event.inputs.version }}" \
            --generate-notes \
            --latest
